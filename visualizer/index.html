<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Constraint Solver — Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <circle cx="14" cy="14" r="12" stroke="url(#g1)" stroke-width="2"/>
                <circle cx="8" cy="11" r="2.5" fill="#6ee7b7"/>
                <circle cx="20" cy="11" r="2.5" fill="#6ee7b7"/>
                <circle cx="14" cy="21" r="2.5" fill="#6ee7b7"/>
                <line x1="8" y1="11" x2="20" y2="11" stroke="#6ee7b755" stroke-width="1"/>
                <line x1="20" y1="11" x2="14" y2="21" stroke="#6ee7b755" stroke-width="1"/>
                <line x1="14" y1="21" x2="8" y2="11" stroke="#6ee7b755" stroke-width="1"/>
                <defs><linearGradient id="g1" x1="0" y1="0" x2="28" y2="28">
                    <stop stop-color="#6ee7b7"/><stop offset="1" stop-color="#3b82f6"/>
                </linearGradient></defs>
            </svg>
            <h1>2D Constraint Solver</h1>
            <span class="badge">Gauss-Seidel Relaxation</span>
        </div>
    </header>

    <nav id="scenarioTabs"></nav>

    <main>
        <div class="canvas-wrap">
            <canvas id="canvas" width="700" height="500"></canvas>
            <div class="canvas-overlay" id="overlay"></div>
        </div>
        <aside id="sidebar">
            <div class="panel" id="infoPanel"></div>
            <div class="panel" id="constraintPanel"></div>
            <div class="controls">
                <button id="btnPlay" class="btn-primary">▶ Animate</button>
                <button id="btnReset" class="btn-secondary">↺ Reset</button>
                <div class="slider-wrap">
                    <label>Progress</label>
                    <input type="range" id="progressSlider" min="0" max="1000" value="1000">
                </div>
                <div class="slider-wrap">
                    <label>Speed</label>
                    <input type="range" id="speedSlider" min="1" max="10" value="5">
                </div>
            </div>
        </aside>
    </main>

    <script src="scenarios.js"></script>
    <script src="renderer.js"></script>
    <script src="app.js"></script>
</body>
</html>
